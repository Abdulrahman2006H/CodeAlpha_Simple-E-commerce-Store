<a class="cover" [routerLink]="['/products', product.id]">
  <img [src]="product.image" [alt]="product.title">
</a>

<div class="product-info">
  <h3>{{ product.title }}</h3>
  <p>{{ product.author }}</p>
  <span class="rating">★ {{ product.rating }}</span>
    <div class="bottom">
      <strong>{{ product.price | currency }}</strong>
      <button (click)="add($event)" aria-label="Add to cart">🛒</button>
    </div>
  </div>
